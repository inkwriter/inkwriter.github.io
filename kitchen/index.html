<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3d2b1f">
<title>Kitchen Inventory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream:       #faf6f0;
    --parchment:   #f0e8d8;
    --warm-tan:    #d4b896;
    --bark:        #8b6348;
    --espresso:    #3d2b1f;
    --moss:        #5a6e3a;
    --moss-light:  #dde8cc;
    --rust:        #b04a2a;
    --rust-light:  #f5ddd6;
    --amber:       #c47d1e;
    --amber-light: #faebd0;
    --text:        #2a1e14;
    --muted:       #7a6050;
    --border:      #d4b896;
    --shadow:      0 2px 12px rgba(61,43,31,.08);
    --r:  12px;
    --rs: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream); color: var(--text);
    min-height: 100dvh; padding-bottom: 90px;
  }

  header {
    background: var(--espresso);
    padding: 1rem 1.25rem 0;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between; padding-bottom: .75rem;
  }
  .app-title {
    font-family: 'Lora', serif;
    font-size: 1.25rem; font-weight: 600; color: var(--parchment);
  }
  .app-sub { font-size: .72rem; color: var(--warm-tan); opacity: .8; }

  .reload-btn {
    background: var(--bark); border: none; color: var(--parchment);
    width: 40px; height: 40px; border-radius: 50%;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .reload-btn:active { background: var(--warm-tan); }

  .tabs { display: flex; }
  .tab {
    flex: 1; padding: .6rem .25rem;
    background: transparent; border: none;
    border-bottom: 3px solid transparent;
    color: var(--warm-tan);
    font-family: 'Source Sans 3', sans-serif;
    font-size: .85rem; cursor: pointer;
    transition: color .15s, border-color .15s; text-align: center;
  }
  .tab.active { color: var(--parchment); border-bottom-color: var(--warm-tan); font-weight: 500; }

  .search-wrap {
    padding: .75rem 1.25rem;
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
  }
  .search-input {
    width: 100%; padding: .55rem .75rem;
    background: var(--cream); border: 1px solid var(--border);
    border-radius: var(--rs);
    font-family: 'Source Sans 3', sans-serif;
    font-size: .9rem; color: var(--text); outline: none;
  }
  .search-input:focus { border-color: var(--bark); }
  .search-input::placeholder { color: var(--muted); }

  .stats-bar {
    display: flex; gap: 8px; padding: .6rem 1.25rem;
    background: var(--parchment);
    overflow-x: auto; scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .pill {
    display: flex; align-items: center; gap: 5px;
    padding: .25rem .7rem; border-radius: 20px;
    font-size: .75rem; font-weight: 500; white-space: nowrap; flex-shrink: 0;
  }
  .pill-total    { background: var(--espresso); color: var(--parchment); }
  .pill-expired  { background: #f5d6d6; color: #8b1a1a; }
  .pill-expiring { background: var(--amber-light); color: var(--amber); }
  .pill-low      { background: var(--rust-light); color: var(--rust); }

  /* CSV note banner */
  .csv-note {
    background: var(--amber-light);
    border-bottom: 1px solid var(--amber);
    padding: .6rem 1.25rem;
    font-size: .78rem; color: #6b4400;
    display: none; align-items: center; gap: 8px;
  }
  .csv-note.show { display: flex; }
  .csv-note button {
    margin-left: auto; background: none; border: none;
    color: #6b4400; font-size: 1rem; cursor: pointer; flex-shrink: 0;
  }

  .item-list { padding: .75rem 1.25rem; display: flex; flex-direction: column; gap: 8px; }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: .75rem; opacity: .5; }
  .empty p { font-size: .95rem; line-height: 1.6; }

  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: .95rem; }

  .card {
    background: #fff; border: 1px solid var(--border);
    border-radius: var(--r); padding: .85rem 1rem;
    display: flex; gap: 12px; align-items: flex-start;
    box-shadow: var(--shadow);
  }
  .card.s-expired { border-left: 3px solid #c0392b; }
  .card.s-soon    { border-left: 3px solid var(--amber); }
  .card.s-low     { border-left: 3px solid var(--rust); }

  .card-icon {
    width: 40px; height: 40px; border-radius: var(--rs);
    background: var(--parchment);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; flex-shrink: 0;
  }
  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Lora', serif; font-size: 1rem; font-weight: 500;
    margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .card-notes { font-size: .78rem; color: var(--muted); margin-top: 4px; }

  .tag { font-size: .72rem; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
  .tag-qty     { background: var(--parchment); color: var(--muted); }
  .tag-ok      { background: var(--moss-light); color: var(--moss); }
  .tag-week    { background: var(--amber-light); color: var(--amber); }
  .tag-soon    { background: var(--amber-light); color: #8a5400; }
  .tag-expired { background: #f5d6d6; color: #8b1a1a; }
  .tag-low     { background: var(--rust-light); color: var(--rust); }

  /* Hide button — display only, does not edit CSV */
  .hide-btn {
    margin-left: auto; flex-shrink: 0;
    background: none; border: none;
    color: var(--muted); font-size: 1.1rem; cursor: pointer;
    padding: 4px; align-self: center;
  }
  .hide-btn:active { color: var(--rust); }

  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--espresso);
    display: flex; border-top: 1px solid rgba(255,255,255,.08); z-index: 100;
  }
  .nav-link {
    flex: 1; padding: .7rem .25rem .55rem;
    background: transparent; border: none; color: var(--warm-tan);
    font-family: 'Source Sans 3', sans-serif; font-size: .7rem;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    text-decoration: none; transition: color .15s;
  }
  .nav-link.active, .nav-link:hover { color: var(--parchment); }
  .nav-icon { font-size: 1.2rem; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="app-title">Kitchen Inventory</div>
      <div class="app-sub" id="loc-label">Fridge</div>
    </div>
    <button class="reload-btn" onclick="loadAndRender()" title="Reload from CSV" aria-label="Reload">↺</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-loc="fridge"  onclick="switchTab('fridge')">🧊 Fridge</button>
    <button class="tab"        data-loc="freezer" onclick="switchTab('freezer')">❄️ Freezer</button>
    <button class="tab"        data-loc="pantry"  onclick="switchTab('pantry')">🧺 Pantry</button>
  </div>
</header>

<div class="search-wrap">
  <input class="search-input" id="search" type="text" placeholder="Search items…" oninput="render()" autocomplete="off">
</div>
<div class="stats-bar" id="stats"></div>

<div class="csv-note" id="csv-note">
  ✏️ Hidden items are display-only — edit <strong>inventory.csv</strong> to permanently remove them.
  <button onclick="document.getElementById('csv-note').classList.remove('show')">✕</button>
</div>

<div class="item-list" id="list">
  <div class="loading">Loading inventory…</div>
</div>

<nav class="bottom-nav">
  <a class="nav-link active" href="index.html"><span class="nav-icon">🥫</span>Inventory</a>
  <a class="nav-link"        href="meals.html"><span class="nav-icon">🍽️</span>Meals</a>
</nav>

<script src="data.js"></script>
<script>
let allItems  = [];   // full list from CSV
let hiddenIds = new Set(); // items hidden this session
let tab       = 'fridge';

async function loadAndRender() {
  document.getElementById('list').innerHTML = '<div class="loading">Loading inventory…</div>';
  try {
    allItems = await KitchenData.loadInventory();
    hiddenIds.clear();
    document.getElementById('csv-note').classList.remove('show');
    render();
  } catch (e) {
    document.getElementById('list').innerHTML = `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <p>Could not load inventory.csv<br><small style="color:var(--muted)">${e.message}</small></p>
    </div>`;
  }
}

function switchTab(loc) {
  tab = loc;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.loc === loc));
  document.getElementById('loc-label').textContent = loc.charAt(0).toUpperCase() + loc.slice(1);
  document.getElementById('search').value = '';
  render();
}

function hideItem(id) {
  hiddenIds.add(id);
  document.getElementById('csv-note').classList.add('show');
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();

  // Full tab items (excluding hidden) for stats
  const tabItems = KitchenData.getItemsByLocation(allItems, tab)
    .filter(i => !hiddenIds.has(i.id));

  // Filtered for search
  let visible = tabItems;
  if (q) visible = visible.filter(i =>
    i.name.toLowerCase().includes(q) || (i.notes || '').toLowerCase().includes(q)
  );

  // Stats
  const expired  = tabItems.filter(i => KitchenData.getExpirationStatus(i.expDate) === 'expired').length;
  const expiring = tabItems.filter(i => ['soon','week'].includes(KitchenData.getExpirationStatus(i.expDate))).length;
  const low      = tabItems.filter(i => i.lowStock).length;
  let stats = `<div class="pill pill-total">${tabItems.length} item${tabItems.length !== 1 ? 's' : ''}</div>`;
  if (expired)  stats += `<div class="pill pill-expired">🚫 ${expired} expired</div>`;
  if (expiring) stats += `<div class="pill pill-expiring">⏰ ${expiring} expiring</div>`;
  if (low)      stats += `<div class="pill pill-low">⚠️ ${low} low stock</div>`;
  document.getElementById('stats').innerHTML = stats;

  const listEl = document.getElementById('list');

  if (!visible.length) {
    const icon = tab === 'fridge' ? '🧊' : tab === 'freezer' ? '❄️' : '🧺';
    listEl.innerHTML = `<div class="empty">
      <div class="empty-icon">${icon}</div>
      <p>${q ? 'No items match your search.' : 'Nothing here — edit inventory.csv to add items.'}</p>
    </div>`;
    return;
  }

  // Sort: expired → soon → week → ok → none, then alpha
  const order = { expired: 0, soon: 1, week: 2, ok: 3, none: 4 };
  visible.sort((a, b) => {
    const diff = order[KitchenData.getExpirationStatus(a.expDate)] - order[KitchenData.getExpirationStatus(b.expDate)];
    return diff !== 0 ? diff : a.name.localeCompare(b.name);
  });

  listEl.innerHTML = visible.map(item => {
    const status  = KitchenData.getExpirationStatus(item.expDate);
    const cardCls = status === 'expired' ? 's-expired' : status === 'soon' ? 's-soon' : item.lowStock ? 's-low' : '';

    let expTag = '';
    if (item.expDate) {
      const cls    = { expired: 'tag-expired', soon: 'tag-soon', week: 'tag-week', ok: 'tag-ok' }[status] || 'tag-ok';
      const prefix = status === 'expired' ? '🚫 Exp ' : status === 'soon' ? '⚠️ Exp ' : '📅 ';
      expTag = `<span class="tag ${cls}">${prefix}${KitchenData.formatExpDate(item.expDate)}</span>`;
    }

    return `<div class="card ${cardCls}">
      <div class="card-icon">${KitchenData.esc(item.emoji) || '🥫'}</div>
      <div class="card-body">
        <div class="card-name">${KitchenData.esc(item.name)}</div>
        <div class="card-meta">
          ${item.quantity ? `<span class="tag tag-qty">${KitchenData.esc(item.quantity)}</span>` : ''}
          ${expTag}
          ${item.lowStock ? `<span class="tag tag-low">⚠️ Low</span>` : ''}
        </div>
        ${item.notes ? `<div class="card-notes">${KitchenData.esc(item.notes)}</div>` : ''}
      </div>
      <button class="hide-btn" onclick="hideItem('${item.id}')" title="Hide this item" aria-label="Hide">✕</button>
    </div>`;
  }).join('');
}

loadAndRender();
</script>
</body>
</html>
